<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مساعد الذكاء الاصطناعي stiven</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/11.1.1/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
</head>
<body>

    <div class="app-container">
        
        <aside class="sidebar">
            <div class="logo">
                <h2><i class="fa-solid fa-robot"></i> stiven AI</h2>
            </div>
            
            <div class="selection-box">
                <h3>اختر مساعدك الآن:</h3>
                
                <button class="char-btn active" id="btn-stiven">
                    <i class="fa-solid fa-user-astronaut"></i>
                    <span>المساعد stiven</span>
                </button>

                <button class="char-btn" id="btn-hadia">
                    <i class="fa-solid fa-wand-magic-sparkles"></i>
                    <span>المساعدة hadia</span>
                </button>
            </div>
        </aside>

        <main class="chat-area">
            <header class="chat-header">
                <h3 id="current-chat-name">المساعد stiven</h3>
            </header>

            <div class="messages-box" id="chat-messages">
                <div class="msg ai-msg" id="welcome-text">
                    مرحباً! أنا stiven، مساعدك الشخصي. كيف يمكنني مساعدتك اليوم؟
                </div>
            </div>

            <footer class="chat-footer">
                <form id="message-form">
                    <input type="text" id="text-input" placeholder="اكتب سؤالك هنا لـ stiven..." required autocomplete="off">
                    <button type="submit" id="send-button"><i class="fa-solid fa-paper-plane"></i></button>
                </form>
            </footer>
        </main>

    </div>

    <script src="script.js"></script>
</body>
</html>
