<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Stiven AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="chat-area">
        <header class="chat-header">
            <h3 id="current-chat-name">مساعدك stiven</h3>
        </header>
        <div class="messages-box" id="chat-messages">
            <div class="msg ai-msg" id="welcome-msg">مرحباً! أنا stiven، كيف يمكنني مساعدتك اليوم؟</div>
        </div>
        <footer class="chat-footer">
            <form id="message-form">
                <input type="text" id="user-input" placeholder="اكتب سؤالك هنا..." required autocomplete="off">
                <button type="submit" id="send-button">إرسال</button>
            </form>
        </footer>
    </main>
    <script src="script.js"></script>
</body>
</html>
